<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Srinidhi Desktop Portfolio</title>
  <meta name="description" content="Desktop-style portfolio with anime wallpaper, glass windows, and 3D project carousel." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/desktop.css" />
  <link rel="stylesheet" href="./css/window.css" />
  <link rel="stylesheet" href="./css/carousel.css" />
  <link rel="stylesheet" href="./css/cursor.css" />
</head>
<body>
  <canvas id="wallpaper-canvas" aria-hidden="true"></canvas>
  <canvas id="ripple-canvas" aria-hidden="true"></canvas>
  <div id="cursor-pointer" aria-hidden="true"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 3 L17 15 L12.2 15.2 L14.8 21 L11.9 22 L9.3 16.1 L5.7 19.2 Z"></path></svg></div>

  <main id="desktop" aria-label="Desktop portfolio environment">
    <section id="icon-grid" aria-label="Desktop icons" hidden></section>

    <section id="hero-center" aria-label="Welcome text">
      <p class="hero-kicker">interactive portfolio</p>
      <h1 class="hero-title">Welcome to my portfolio</h1>
      <p class="hero-subtitle">Explore projects, skills, writing, experience, and contact links from the dock below.</p>
    </section>

    <div id="taskbar" role="toolbar" aria-label="Desktop taskbar">
      <button class="taskbar-btn" id="dock-about" data-window="about-window" aria-label="Open about window">👤<span class="tooltip">About Me</span></button>
      <button class="taskbar-btn" id="dock-projects" data-window="projects-window" aria-label="Open projects window">🗂️<span class="tooltip">Projects</span></button>
      <button class="taskbar-btn" data-window="skills-window" aria-label="Open skills window">⚡<span class="tooltip">Skills</span></button>
      <button class="taskbar-btn" data-window="experience-window" aria-label="Open experience window">💼<span class="tooltip">Experience</span></button>
      <button class="taskbar-btn" id="dock-contact" data-window="contact-window" aria-label="Open quick links window">🔗<span class="tooltip">Quick Links</span></button>
      <div class="taskbar-sep"></div>
      <button id="theme-toggle" aria-label="Toggle theme"></button>
      <div id="taskbar-clock" aria-live="polite"></div>
    </div>
  </main>

  <section class="window" id="about-window" style="width: 700px; height: 280px; left: 180px; top: 120px;">
    <header class="window-titlebar">
      <div class="window-controls">
        <button class="wc-btn wc-close" aria-label="Close"></button>
        <button class="wc-btn wc-min" aria-label="Minimize"></button>
        <button class="wc-btn wc-max" aria-label="Maximize"></button>
      </div>
      <div class="window-title"><span class="window-title-icon">👤</span>About Me</div><div class="window-actions"><button class="wa-btn wa-min" aria-label="Minimize window">—</button><button class="wa-btn wa-max" aria-label="Maximize window">▢</button></div>
    </header>
    <div class="window-body"><div id="about-content"></div><div class="window-resize"></div></div>
  </section>

  <section class="window" id="projects-window" style="width: 980px; height: 620px; left: 240px; top: 180px;">
    <header class="window-titlebar">
      <div class="window-controls">
        <button class="wc-btn wc-close" aria-label="Close"></button>
        <button class="wc-btn wc-min" aria-label="Minimize"></button>
        <button class="wc-btn wc-max" aria-label="Maximize"></button>
      </div>
      <div class="window-title"><span class="window-title-icon">🗂️</span>Projects</div><div class="window-actions"><button class="wa-btn wa-min" aria-label="Minimize window">—</button><button class="wa-btn wa-max" aria-label="Maximize window">▢</button></div>
    </header>
    <div class="window-body">
      <div id="carousel-container">
        <canvas id="carousel-canvas"></canvas>
        <div id="carousel-dots"></div>
        <div id="carousel-nav" aria-hidden="true"></div>
        <div id="carousel-hud">
          <div id="carousel-meta">
            <div id="carousel-left">
              <div id="carousel-date"></div>
              <div id="carousel-title"></div>
              <div id="carousel-subtitle"></div>
              <div id="carousel-tags"></div>
            </div>
            <div id="carousel-right">
              <div id="carousel-desc"></div>
              <a id="carousel-github" href="#" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
            </div>
          </div>
        </div>
      </div>
      <div class="window-resize"></div>
    </div>
  </section>

  <section class="window" id="skills-window" style="width: 760px; height: 480px; left: 180px; top: 140px;">
    <header class="window-titlebar">
      <div class="window-controls">
        <button class="wc-btn wc-close" aria-label="Close"></button>
        <button class="wc-btn wc-min" aria-label="Minimize"></button>
        <button class="wc-btn wc-max" aria-label="Maximize"></button>
      </div>
      <div class="window-title"><span class="window-title-icon">⚡</span>Skills</div><div class="window-actions"><button class="wa-btn wa-min" aria-label="Minimize window">—</button><button class="wa-btn wa-max" aria-label="Maximize window">▢</button></div>
    </header>
    <div class="window-body scrollable"><div id="skills-content"></div><div class="window-resize"></div></div>
  </section>

  <section class="window" id="experience-window" style="width: 760px; height: 520px; left: 300px; top: 120px;">
    <header class="window-titlebar">
      <div class="window-controls">
        <button class="wc-btn wc-close" aria-label="Close"></button>
        <button class="wc-btn wc-min" aria-label="Minimize"></button>
        <button class="wc-btn wc-max" aria-label="Maximize"></button>
      </div>
      <div class="window-title"><span class="window-title-icon">💼</span>Experience</div><div class="window-actions"><button class="wa-btn wa-min" aria-label="Minimize window">—</button><button class="wa-btn wa-max" aria-label="Maximize window">▢</button></div>
    </header>
    <div class="window-body"><div id="experience-content"></div><div class="window-resize"></div></div>
  </section>

  <section class="window" id="blogs-window" style="width: 720px; height: 430px; left: 360px; top: 160px;">
    <header class="window-titlebar">
      <div class="window-controls">
        <button class="wc-btn wc-close" aria-label="Close"></button>
        <button class="wc-btn wc-min" aria-label="Minimize"></button>
        <button class="wc-btn wc-max" aria-label="Maximize"></button>
      </div>
      <div class="window-title"><span class="window-title-icon">✍️</span>Blogs</div><div class="window-actions"><button class="wa-btn wa-min" aria-label="Minimize window">—</button><button class="wa-btn wa-max" aria-label="Maximize window">▢</button></div>
    </header>
    <div class="window-body"><div id="blogs-content"></div><div class="window-resize"></div></div>
  </section>

  <section class="window" id="contact-window" style="width: 580px; height: 340px; left: 420px; top: 220px;">
    <header class="window-titlebar">
      <div class="window-controls">
        <button class="wc-btn wc-close" aria-label="Close"></button>
        <button class="wc-btn wc-min" aria-label="Minimize"></button>
        <button class="wc-btn wc-max" aria-label="Maximize"></button>
      </div>
      <div class="window-title"><span class="window-title-icon">🔗</span>Quick Links</div><div class="window-actions"><button class="wa-btn wa-min" aria-label="Minimize window">—</button><button class="wa-btn wa-max" aria-label="Maximize window">▢</button></div>
    </header>
    <div class="window-body"><div id="contact-content"></div><div class="window-resize"></div></div>
  </section>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
