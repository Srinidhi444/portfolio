<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Srinidhi Kulkarni — Portfolio</title>
  <meta name="description" content="Portfolio of Srinidhi Kulkarni — Full-Stack Engineer & Web3 Learner based in Pune, India." />

  <!-- Open Graph -->
  <meta property="og:title"       content="Srinidhi Kulkarni — Portfolio" />
  <meta property="og:description" content="Full-Stack Engineer & Web3 Learner. Projects, skills, and experience." />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://srinidhi444.github.io/" />

  <!-- Twitter / X card -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="Srinidhi Kulkarni — Portfolio" />
  <meta name="twitter:description" content="Full-Stack Engineer & Web3 Learner." />
  <meta name="twitter:site"        content="@Srinidhi_kul" />

  <!-- Canonical -->
  <link rel="canonical" href="https://srinidhi444.github.io/" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/desktop.css" />
  <link rel="stylesheet" href="./css/window.css" />
  <link rel="stylesheet" href="./css/carousel.css" />
  <link rel="stylesheet" href="./css/cursor.css" />

  <style>
    .dock-icon,
    .window-icon {
      display: inline-block;
      object-fit: contain;
      flex-shrink: 0;
    }

    .dock-icon {
      width: 18px;
      height: 18px;
      filter: brightness(0) saturate(100%) invert(95%);
      opacity: 0.92;
    }

    .taskbar-btn:hover .dock-icon {
      opacity: 1;
    }

    .window-title-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: var(--space-1);
    }

    .window-icon {
      width: 14px;
      height: 14px;
      opacity: 1;
    }

    [data-theme="light"] .window-icon {
      filter: brightness(0) saturate(100%);
    }

    [data-theme="dark"] .window-icon {
      filter: brightness(0) saturate(100%) invert(95%);
    }

    [data-theme="light"] .dock-icon {
      filter: brightness(0) saturate(100%);
      opacity: 0.75;
    }

    [data-theme="light"] .taskbar-btn:hover .dock-icon {
      opacity: 1;
    }
  </style>
</head>
<body>
  <canvas id="wallpaper-canvas" aria-hidden="true"></canvas>
  <canvas id="ripple-canvas" aria-hidden="true"></canvas>

  <div id="cursor-pointer" aria-hidden="true">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M4 3 L17 15 L12.2 15.2 L14.8 21 L11.9 22 L9.3 16.1 L5.7 19.2 Z"></path>
    </svg>
  </div>

  <main id="desktop" aria-label="Desktop portfolio environment">
    <section id="icon-grid" aria-label="Desktop icons"></section>

    <section id="hero-center" aria-label="Welcome text">
      <p class="hero-kicker">interactive portfolio</p>
      <h1 class="hero-title">Welcome to my portfolio</h1>
      <p class="hero-subtitle">Explore projects, skills, writing, experience, and contact links from the dock below.</p>
    </section>

    <div id="taskbar" role="toolbar" aria-label="Desktop taskbar">
      <button class="taskbar-btn" data-window="about-window" aria-label="Open about window">
        <img class="dock-icon" src="https://unpkg.com/lucide-static@latest/icons/user-round.svg" alt="" aria-hidden="true">
        <span class="tooltip">About Me</span>
      </button>

      <button class="taskbar-btn" id="dock-projects" data-window="projects-window" aria-label="Open projects window">
        <img class="dock-icon" src="https://unpkg.com/lucide-static@latest/icons/folder-kanban.svg" alt="" aria-hidden="true">
        <span class="tooltip">Projects</span>
      </button>

      <button class="taskbar-btn" data-window="skills-window" aria-label="Open skills window">
        <img class="dock-icon" src="https://unpkg.com/lucide-static@latest/icons/zap.svg" alt="" aria-hidden="true">
        <span class="tooltip">Skills</span>
      </button>

      <button class="taskbar-btn" data-window="experience-window" aria-label="Open experience window">
        <img class="dock-icon" src="https://unpkg.com/lucide-static@latest/icons/briefcase-business.svg" alt="" aria-hidden="true">
        <span class="tooltip">Experience</span>
      </button>

      <button class="taskbar-btn" data-window="blogs-window" aria-label="Open blogs window">
        <img class="dock-icon" src="https://unpkg.com/lucide-static@latest/icons/file-pen-line.svg" alt="" aria-hidden="true">
        <span class="tooltip">Blogs</span>
      </button>

      <button class="taskbar-btn" id="dock-contact" data-window="contact-window" aria-label="Open quick links window">
        <img class="dock-icon" src="https://unpkg.com/lucide-static@latest/icons/link-2.svg" alt="" aria-hidden="true">
        <span class="tooltip">Quick Links</span>
      </button>

      <div class="taskbar-sep"></div>
      <button id="theme-toggle" aria-label="Toggle light / dark theme" title="Toggle theme"></button>
      <div id="taskbar-clock" aria-live="polite"></div>
    </div>
  </main>

  <section class="window" id="about-window" style="width:700px;height:300px;left:180px;top:120px;">
    <header class="window-titlebar">
      <div class="window-controls">
        <button class="wc-btn wc-close" aria-label="Close"></button>
        <button class="wc-btn wc-min" aria-label="Minimize"></button>
        <button class="wc-btn wc-max" aria-label="Maximize"></button>
      </div>
      <div class="window-title">
        <span class="window-title-icon">
          <img class="window-icon" src="https://unpkg.com/lucide-static@latest/icons/user-round.svg" alt="" aria-hidden="true">
        </span>
        About Me
      </div>
      <div class="window-actions">
        <button class="wa-btn wa-min" aria-label="Minimize window">—</button>
        <button class="wa-btn wa-max" aria-label="Maximize window">▢</button>
      </div>
    </header>
    <div class="window-body">
      <div id="about-content"></div>
      <div class="window-resize"></div>
    </div>
  </section>

  <section class="window" id="projects-window" style="width:980px;height:620px;left:240px;top:180px;">
    <header class="window-titlebar">
      <div class="window-controls">
        <button class="wc-btn wc-close" aria-label="Close"></button>
        <button class="wc-btn wc-min" aria-label="Minimize"></button>
        <button class="wc-btn wc-max" aria-label="Maximize"></button>
      </div>
      <div class="window-title">
        <span class="window-title-icon">
          <img class="window-icon" src="https://unpkg.com/lucide-static@latest/icons/folder-kanban.svg" alt="" aria-hidden="true">
        </span>
        Projects
      </div>
      <div class="window-actions">
        <button class="wa-btn wa-min" aria-label="Minimize window">—</button>
        <button class="wa-btn wa-max" aria-label="Maximize window">▢</button>
      </div>
    </header>
    <div class="window-body">
      <div id="carousel-container">
        <canvas id="carousel-canvas"></canvas>
        <div id="carousel-dots"></div>
        <div id="carousel-nav" aria-hidden="true"></div>
        <div id="carousel-hud">
          <div id="carousel-meta">
            <div id="carousel-left">
              <div id="carousel-date"></div>
              <div id="carousel-title"></div>
              <div id="carousel-subtitle"></div>
              <div id="carousel-tags"></div>
            </div>
            <div id="carousel-right">
              <div id="carousel-desc"></div>
              <div class="carousel-links">
                <a id="carousel-github" href="#" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
                <a id="carousel-demo" class="carousel-demo" href="#" target="_blank" rel="noopener noreferrer" style="display:none">Live Demo ↗</a>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="window-resize"></div>
    </div>
  </section>

  <section class="window" id="skills-window" style="width:760px;height:480px;left:180px;top:140px;">
    <header class="window-titlebar">
      <div class="window-controls">
        <button class="wc-btn wc-close" aria-label="Close"></button>
        <button class="wc-btn wc-min" aria-label="Minimize"></button>
        <button class="wc-btn wc-max" aria-label="Maximize"></button>
      </div>
      <div class="window-title">
        <span class="window-title-icon">
          <img class="window-icon" src="https://unpkg.com/lucide-static@latest/icons/zap.svg" alt="" aria-hidden="true">
        </span>
        Skills
      </div>
      <div class="window-actions">
        <button class="wa-btn wa-min" aria-label="Minimize window">—</button>
        <button class="wa-btn wa-max" aria-label="Maximize window">▢</button>
      </div>
    </header>
    <div class="window-body scrollable">
      <div id="skills-content"></div>
      <div class="window-resize"></div>
    </div>
  </section>

  <section class="window" id="experience-window" style="width:760px;height:520px;left:300px;top:120px;">
    <header class="window-titlebar">
      <div class="window-controls">
        <button class="wc-btn wc-close" aria-label="Close"></button>
        <button class="wc-btn wc-min" aria-label="Minimize"></button>
        <button class="wc-btn wc-max" aria-label="Maximize"></button>
      </div>
      <div class="window-title">
        <span class="window-title-icon">
          <img class="window-icon" src="https://unpkg.com/lucide-static@latest/icons/briefcase-business.svg" alt="" aria-hidden="true">
        </span>
        Experience
      </div>
      <div class="window-actions">
        <button class="wa-btn wa-min" aria-label="Minimize window">—</button>
        <button class="wa-btn wa-max" aria-label="Maximize window">▢</button>
      </div>
    </header>
    <div class="window-body">
      <div id="experience-content"></div>
      <div class="window-resize"></div>
    </div>
  </section>

  <section class="window" id="blogs-window" style="width:720px;height:430px;left:360px;top:160px;">
    <header class="window-titlebar">
      <div class="window-controls">
        <button class="wc-btn wc-close" aria-label="Close"></button>
        <button class="wc-btn wc-min" aria-label="Minimize"></button>
        <button class="wc-btn wc-max" aria-label="Maximize"></button>
      </div>
      <div class="window-title">
        <span class="window-title-icon">
          <img class="window-icon" src="https://unpkg.com/lucide-static@latest/icons/file-pen-line.svg" alt="" aria-hidden="true">
        </span>
        Blogs
      </div>
      <div class="window-actions">
        <button class="wa-btn wa-min" aria-label="Minimize window">—</button>
        <button class="wa-btn wa-max" aria-label="Maximize window">▢</button>
      </div>
    </header>
    <div class="window-body">
      <div id="blogs-content"></div>
      <div class="window-resize"></div>
    </div>
  </section>

  <section class="window" id="contact-window" style="width:580px;height:360px;left:420px;top:220px;">
    <header class="window-titlebar">
      <div class="window-controls">
        <button class="wc-btn wc-close" aria-label="Close"></button>
        <button class="wc-btn wc-min" aria-label="Minimize"></button>
        <button class="wc-btn wc-max" aria-label="Maximize"></button>
      </div>
      <div class="window-title">
        <span class="window-title-icon">
          <img class="window-icon" src="https://unpkg.com/lucide-static@latest/icons/link-2.svg" alt="" aria-hidden="true">
        </span>
        Quick Links
      </div>
      <div class="window-actions">
        <button class="wa-btn wa-min" aria-label="Minimize window">—</button>
        <button class="wa-btn wa-max" aria-label="Maximize window">▢</button>
      </div>
    </header>
    <div class="window-body">
      <div id="contact-content"></div>
      <div class="window-resize"></div>
    </div>
  </section>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
